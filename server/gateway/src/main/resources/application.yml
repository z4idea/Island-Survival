# @author: zhjj
# Island Survival 网关配置。敏感项支持环境变量覆盖（生产用 env，勿把真实密钥提交进库）。
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: island-survival-gateway
  datasource:
    # 144 上的 MySQL 8.0：宿主端口 13306 -> 容器内 3306
    url: jdbc:mysql://${DB_HOST:192.168.101.144}:${DB_PORT:13306}/${DB_NAME:island_survival}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 开发期由实体自动建表；上线后建议切 validate + Flyway 显式迁移
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

app:
  jwt:
    # 生产务必用环境变量覆盖成长随机串；默认值仅供本地开发
    secret: ${JWT_SECRET:island-survival-dev-secret-change-me-please-32bytes-min}
    # token 有效期（分钟），默认 7 天
    expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  cors:
    # 前端 Vite dev server
    allowed-origins: ${CORS_ORIGINS:http://localhost:5188,http://127.0.0.1:5188}

logging:
  level:
    com.zhjj.islandsurvival: INFO
